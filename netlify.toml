[build]
  base = "apps/web"
  command = "cd ../.. && npm install && cd apps/web && npx next build"
  publish = ".next"

[build.environment]
  NEXT_PUBLIC_API_URL = "https://toorvest-api.onrender.com/api"
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
